    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

elative;\n  }\n  section.dark{ background:var(--green-900); color:#f1ede0; }\n  section.dark::before{\n    content:\"\";position:absolute;inset:0;\n    background:\n      radial-gradient(1100px 700px at 88% -10%, rgba(46,139,87,.28), transparent 60%),\n      radial-gradient(900px 600px at -8% 110%, rgba(14,107,107,.22), transparent 60%);\n    pointer-events:none;\n  }\n  section.dark > *{position:relative;z-index:1;}\n\n  /* ---- shared atoms ---- */\n  .eyebrow{\n    font-family:var(--ff-mono);\n    font-size:var(--type-small);\n    letter-spacing:.18em;text-transform:uppercase;\n    color:var(--teal);font-weight:500;\n    display:flex;align-items:center;gap:18px;\n  }\n  .eyebrow .dot{width:11px;height:11px;border-radius:50%;background:var(--gold);}\n  section.dark .eyebrow{color:var(--gold-soft);}\n  section.dark .eyebrow .dot{background:var(--gold-soft);}\n\n  .slide-title{\n    font-family:var(--ff-display);\n    font-size:var(--type-title);\n    font-weight:600;line-height:1.04;\n    letter-spacing:-.015em;margin:0;\n    color:var(--green-700);\n  }\n  section.dark .slide-title{color:#fff;}\n  .slide-title .gold{color:var(--gold);}\n  section.dark .slide-title .gold{color:var(--gold-soft);}\n\n  .head{display:flex;flex-direction:column;gap:16px;margin-bottom:var(--gap-title);}\n  .head.row{flex-direction:row;align-items:flex-end;justify-content:space-between;gap:32px;}\n\n  .kicker{font-size:var(--type-body);color:var(--muted);font-weight:500;}\n  section.dark .kicker{color:rgba(241,237,224,.72);}\n\n  .pageno{\n    position:absolute;right:var(--pad-x);bottom:36px;\n    font-family:var(--ff-mono);font-size:24px;letter-spacing:.12em;\n    color:var(--muted);z-index:2;\n  }\n  section.dark .pageno{color:rgba(241,237,224,.55);}\n\n  .body-text{font-size:var(--type-body);line-height:1.4;color:var(--ink);}\n  .muted{color:var(--muted);}\n\n  /* risk colour atoms */\n  .rk{display:inline-flex;align-items:center;gap:10px;font-weight:600;}\n  .rk .sw{width:14px;height orders<\u002Fspan><span class=\"ryr\">2024<\u002Fspan><span class=\"rbar\"><span style=\"width:82%;background:var(--high);\"><\u002Fspan><\u002Fspan><span class=\"rsc c-high\">61.72%<\u002Fspan><\u002Fdiv>\n        <div class=\"rrow\"><span class=\"rname\">Najran<\u002Fspan><span class=\"ryr\">2023<\u002Fspan><span class=\"rbar\"><span style=\"width:77%;background:var(--high);\"><\u002Fspan><\u002Fspan><span class=\"rsc c-high\">58.38%<\u002Fspan><\u002Fdiv>\n        <div class=\"rrow\"><span class=\"rname\">Al-Riyadh<\u002Fspan><span class=\"ryr\">2024<\u002Fspan><span class=\"rbar\"><span style=\"width:73%;background:var(--med);\"><\u002Fspan><\u002Fspan><span class=\"rsc c-med\">54.91%<\u002Fspan><\u002Fdiv>\n        <div class=\"rrow\"><span class=\"rname\">Makkah Al-Mokarramah<\u002Fspan><span class=\"ryr\">2023<\u002Fspan><span class=\"rbar\"><span style=\"width:65%;background:var(--med);\"><\u002Fspan><\u002Fspan><span class=\"rsc c-med\">49.24%<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"anim2\">\n        <div style=\"display:flex;align-items:center;gap:12px;font-family:var(--ff-display);font-weight:600;font-size:30px;color:var(--low);margin-bottom:18px;\"><span class=\"sw sw-low\" style=\"width:18px;height:18px;\"><\u002Fspan>Lowest Risk Regions<\u002Fdiv>\n        <div class=\"rrow\"><span class=\"rname\">Al-Qassim<\u002Fspan><span class=\"ryr\">2024<\u002Fspan><span class=\"rbar\"><span style=\"width:14%;background:var(--low);\"><\u002Fspan><\u002Fspan><span class=\"rsc c-low\">10.73%<\u002Fspan><\u002Fdiv>\n        <div class=\"rrow\"><span class=\"rname\">Ha'il<\u002Fspan><span class=\"ryr\">2024<\u002Fspan><span class=\"rbar\"><span style=\"width:25%;background:var(--low);\"><\u002Fspan><\u002Fspan><span class=\"rsc c-low\">18.83%<\u002Fspan><\u002Fdiv>\n        <div class=\"rrow\"><span class=\"rname\">Jazan<\u002Fspan><span class=\"ryr\">2024<\u002Fspan><span class=\"rbar\"><span style=\"width:28%;background:var(--low);\"><\u002Fspan><\u002Fspan><span class=\"rsc c-low\">21.04%<\u002Fspan><\u002Fdiv>\n        <div class=\"rrow\"><span class=\"rname\">Al-Baha<\u002Fspan><span class=\"ryr\">2024<\u002Fspan><span class=\"rbar\"><span style=\"width:49%;background:var(--med);\"><\u002Fspan><\u002Fspan><span class=\"rsc c-med\">37.25%<\u002Fspan><\u002Fdiv>\n        <div class=\"rrow\"><span class=\"rname\">Al-Jawf<\u002Fspan><span class=\"ryr\">2023<\u002Fspan><span class=\"rbar\"><span style=\"width:52%;background:var(--med);\"><\u002Fspan><\u002Fspan><span class=\"rsc c-med\">39.20%<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"anim3\" style=\"margin-top:30px;font-size:27px;color:var(--muted);text-align:center;\">\n      A <strong style=\"color:var(--green-700);\">65-point gap<\u002Fstrong> separates the highest- and lowest-risk regions.\n    <\u002Fdiv>\n    <style>\n      .rrow{display:grid;grid-template-columns:1.5fr auto 1.1fr auto;align-items:center;gap:18px;padding:16px 0;border-top:1px solid var(--line);}\n      .rname{font-family:var(--ff-display);font-weight:600;font-size:27px;color:var(--green-700);}\n      .ryr{font-family:var(--ff-mono);font-size:24px;color:var(--muted);}\n      .rbar{height:12px;background:var(--sand-200);border-radius:6px;overflow:hidden;}\n      .rbar span{display:block;height:100%;border-radius:6px;}\n      .rsc{font-family:var(--ff-display);font-weight:700;font-size:28px;text-align:right;}\n    <\u002Fstyle>\n    <div class=\"pageno\">11 / 15<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= SLIDE 12 — CHALLENGES ================= -->\n  <section data-label=\"Challenges\" data-screen-label=\"12 Challenges\">\n    <div class=\"head\">\n      <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan>05 · Challenges<\u002Fdiv>\n      <h2 class=\"slide-title\">Challenges &amp; How We Responded<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:18px;flex:1;justify-content:center;\">\n      <div class=\"anim cr\">\n        <div class=\"cr-c\"><div class=\"cr-lbl\">CHALLENGE<\u002Fdiv><div class=\"cr-tx\">Only 8 rows from Makkah → 50% accuracy<\u002Fdiv><\u002Fdiv>\n        <div class=\"cr-ar\">→<\u002Fdiv>\n        <div class=\"cr-r\"><div class=\"cr-lbl\" style=\"color:var(--low);\">RESPONSE<\u002Fdiv><div class=\"cr-tx\">Expanded to 13 regions + Gaussian noise → 87.80% accuracy<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"anim2 cr\">\n        <div class=\"cr-c\"><div class=\"cr-lbl\">CHALLENGE<\u002Fdiv><div class=\"cr-tx\">Wrong features in original code (year &amp; type, not percentages)<\u002Fdiv><\u002Fdiv>\n        <div class=\"cr-ar\">→<\u002Fdiv>\n        <div class=\"cr-r\"><div class=\"cr-lbl\" style=\"color:var(--low);\">RESPONSE<\u002Fdiv><div class=\"cr-tx\">Complete rewrite of preprocessing &amp; training pipeline<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"anim3 cr\">\n        <div class=\"cr-c\"><div class=\"cr-lbl\">CHALLENGE<\u002Fdiv><div class=\"cr-tx\">No ground-truth labels in the dataset<\u002Fdiv><\u002Fdiv>\n        <div class=\"cr-ar\">→<\u002Fdiv>\n        <div class=\"cr-r\"><div class=\"cr-lbl\" style=\"color:var(--low);\">RESPONSE<\u002Fdiv><div class=\"cr-tx\">Percentile-based TotalPollutionScore thresholds (P25 / P75)<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"anim4 cr\">\n        <div class=\"cr-c\"><div class=\"cr-lbl\">CHALLENGE<\u002Fdiv><div class=\"cr-tx\">Only 2 survey years available (2023–2024)<\u002Fdiv><\u002Fdiv>\n        <div class=\"cr-ar\">→<\u002Fdiv>\n        <div class=\"cr-r\"><div class=\"cr-lbl\" style=\"color:var(--low);\">RESPONSE<\u002Fdiv><div class=\"cr-tx\">Cross-sectional classification (not time-series forecasting)<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <style>\n      .cr{display:grid;grid-template-columns:1fr auto 1fr;align-items:stretch;gap:0;}\n      .cr-c,.cr-r{padding:22px 30px;border:1px solid var(--line);}\n      .cr-c{background:#fbf4ef;border-right:none;border-radius:14px 0 0 14px;border-left:5px solid var(--high);}\n      .cr-r{background:#fffdf8;border-left:none;border-radius:0 14px 14px 0;border-right:5px solid var(--low);}\n      .cr-ar{display:flex;align-items:center;justify-content:center;background:#fffdf8;border-top:1px solid var(--line);border-bottom:1px solid var(--line);color:var(--gold);font-size:34px;font-weight:700;padding:0 16px;}\n      .cr-lbl{font-family:var(--ff-mono);font-size:24px;letter-spacing:.1em;color:var(--high);margin-bottom:8px;}\n      .cr-tx{font-size:27px;line-height:1.32;color:var(--ink);font-weight:500;}\n    <\u002Fstyle>\n    <div class=\"pageno\">12 / 15<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= SLIDE 13 — LESSONS ================= -->\n  <section data-label=\"Lessons Learned\" data-screen-label=\"13 Lessons\">\n    <div class=\"head\">\n      <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan>05 · Lessons<\u002Fdiv>\n      <h2 class=\"slide-title\">Lessons Learned<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:26px;flex:1;\">\n      <div class=\"anim card\" style=\"gap:14px;\">\n        <div style=\"font-family:var(--ff-display);font-weight:700;font-size:46px;color:var(--gold);\">01<\u002Fdiv>\n        <div style=\"font-family:var(--ff-display);font-weight:600;font-size:31px;color:var(--green-700);\">Feature Engineering &gt; Algorithm<\u002Fdiv>\n        <div class=\"body-text muted\" style=\"font-size:26px;\">Wrong features gave 50% accuracy; correct features gave 87.80% — same algorithm.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"anim2 card\" style=\"gap:14px;\">\n        <div style=\"font-family:var(--ff-display);font-weight:700;font-size:46px;color:var(--gold);\">02<\u002Fdiv>\n        <div style=\"font-family:var(--ff-display);font-weight:600;font-size:31px;color:var(--green-700);\">Define Labels Before Coding<\u002Fdiv>\n        <div class=\"body-text muted\" style=\"font-size:26px;\">No labeling strategy in Phase 1 forced a redesign. Labels must be specified before any model code.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"anim3 card\" style=\"gap:14px;\">\n        <div style=\"font-family:var(--ff-display);font-weight:700;font-size:46px;color:var(--gold);\">03<\u002Fdiv>\n        <div style=\"font-family:var(--ff-display);font-weight:600;font-size:31px;color:var(--green-700);\">Small Data = Different Approach<\u002Fdiv>\n        <div class=\"body-text muted\" style=\"font-size:26px;\">Train-test splits fail on small data. Stratified 5-Fold CV and constrained trees are the right tools.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"anim4 card\" style=\"gap:14px;\">\n        <div style=\"font-family:var(--ff-display);font-weight:700;font-size:46px;color:var(--gold);\">04<\u002Fdiv>\n        <div style=\"font-family:var(--ff-display);font-weight:600;font-size:31px;color:var(--green-700);\">Wider Scope = Richer Insight<\u002Fdiv>\n        <div class=\"body-text muted\" style=\"font-size:26px;\">Expanding from 1 to 13 regions revealed a 65-point gap between highest and lowest risk.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pageno\">13 / 15<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= SLIDE 14 — CONCLUSION ================= -->\n  <section data-label=\"Conclusion &amp; Future Work\" data-screen-label=\"14 Conclusion\">\n    <div class=\"head\">\n      <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan>06 · Conclusion<\u002Fdiv>\n      <h2 class=\"slide-title\">Conclusion &amp; Future Work<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"anim\" style=\"background:linear-gradient(180deg,#15542f,#0f4a2a);border-radius:18px;padding:38px 46px;margin-bottom:38px;color:#f1ede0;\">\n      <div style=\"font-family:var(--ff-display);font-weight:500;font-size:38px;line-height:1.32;\">\n        A supervised ML pipeline classifying air-pollution risk across <span style=\"color:var(--gold-soft);\">13 Saudi regions<\u002Fspan> — achieving <span style=\"color:#fff;font-weight:700;\">87.80% accuracy<\u002Fspan> and exceeding all Phase 1 targets.\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:48px;flex:1;\">\n      <div class=\"anim2\">\n        <div style=\"font-family:var(--ff-mono);font-size:24px;color:var(--high);letter-spacing:.08em;margin-bottom:16px;\">CURRENT LIMITATIONS<\u002Fdiv>\n        <div class=\"lim\">Only 2 survey years (2023–2024)<\u002Fdiv>\n        <div class=\"lim\">Regional level — no sub-district data<\u002Fdiv>\n        <div class=\"lim\">Augmented majority of training data<\u002Fdiv>\n        <div class=\"lim\">Hajj seasonality not separated<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"anim3\">\n        <div style=\"font-family:var(--ff-mono);font-size:24px;color:var(--teal);letter-spacing:.08em;margin-bottom:16px;\">FUTURE RECOMMENDATIONS<\u002Fdiv>\n        <div class=\"fut\">Add more survey years as GASTAT publishes<\u002Fdiv>\n        <div class=\"fut\">Random Forest + SHAP for better accuracy<\u002Fdiv>\n        <div class=\"fut\">Real-time sensor integration<\u002Fdiv>\n        <div class=\"fut\">Interactive web dashboard (Streamlit)<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <style>\n      .lim,.fut{display:flex;align-items:flex-start;gap:16px;font-size:28px;line-height:1.34;color:var(--ink);padding:15px 0;border-top:1px solid var(--line);}\n      .lim::before{content:\"–\";color:var(--high);font-weight:700;}\n      .fut::before{content:\"→\";color:var(--teal);font-weight:700;}\n    <\u002Fstyle>\n    <div class=\"pageno\">14 / 15<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= SLIDE 15 — THANK YOU ================= -->\n  <section class=\"dark\" data-label=\"Thank You\" data-screen-label=\"15 Thank You\">\n    <div style=\"position:absolute;top:var(--pad-top);right:var(--pad-x);text-align:right;border-right:3px solid var(--gold-soft);padding-right:22px;\">\n      <div style=\"font-family:var(--ff-display);font-weight:600;font-size:26px;color:#fff;\">Umm Al-Qura University<\u002Fdiv>\n      <div style=\"font-family:var(--ff-mono);font-size:24px;letter-spacing:.08em;color:var(--gold-soft);margin-top:5px;\">AI System Design · A13104<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin:auto 0;\">\n      <div class=\"eyebrow anim\"><span class=\"dot\"><\u002Fspan>Thank you for your attention<\u002Fdiv>\n      <h2 class=\"anim\" style=\"font-family:var(--ff-display);font-weight:700;font-size:148px;line-height:.98;color:#fff;margin:24px 0 0;letter-spacing:-.02em;\">Thank You<\u002Fh2>\n      <div class=\"anim2\" style=\"font-family:var(--ff-display);font-weight:500;font-size:54px;color:var(--gold-soft);margin-top:12px;\">Questions?<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"anim3\" style=\"margin-top:auto;display:flex;flex-direction:column;gap:14px;\">\n      <div style=\"font-size:28px;color:#fff;display:flex;align-items:center;gap:14px;flex-wrap:wrap;\">\n        <span style=\"color:var(--gold-soft);\">★<\u002Fspan> Linah Ebrahim Alsayed <span class=\"sep\">·<\u002Fspan> Salam Ali Alghamdi <span class=\"sep\">·<\u002Fspan> Danah Hesham Alharbi <span class=\"sep\">·<\u002Fspan> Khadija Ali Mirza\n      <\u002Fdiv>\n      <div style=\"font-size:24px;color:rgba(241,237,224,.72);\">Supervised by Dr. Hawazin Badawi &nbsp;|&nbsp; AI System Design A13104 &nbsp;|&nbsp; Umm Al-Qura University<\u002Fdiv>\n      <div style=\"font-family:var(--ff-mono);font-size:24px;color:var(--gold-soft);\">https://github.com/Linah-AI/Saudi-Arabia-Air-Pollution-AI.git<\u002Fdiv>\n    <\u002Fdiv>\n    <style>.sep{color:var(--gold-soft);}<\u002Fstyle>\n  <\u002Fsection>\n\n<\u002Fdeck-stage>\n<script src=\"4c870472-7fd0-4f09-a876-ca57d1428534\"><\u002Fscript>\n<script>\n/* Entrance reveal driver — applies a brief hidden state to the active slide's\n   .anim items, then releases it so CSS transitions play. A setTimeout fallback\n   (timers run even when the animation clock is frozen) guarantees the items end\n   visible no matter the environment. */\n(function () {\n  var REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion:reduce)').matches;\n  function reveal(slide) {\n    if (!slide) return;\n    var els = slide.querySelectorAll('.anim,.anim2,.anim3,.anim4');\n    if (!els.length) return;\n    if (REDUCED) { els.forEach(function (el) { el.classList.remove('reveal-pre'); }); return; }\n    els.forEach(function (el) { el.classList.add('reveal-pre'); });\n    void slide.offsetWidth; /* force reflow so the hidden state paints */\n    var release = function () { els.forEach(function (el) { el.classList.remove('reveal-pre'); }); };\n    requestAnimationFrame(function () { requestAnimationFrame(release); });\n    setTimeout(release, 120);            /* normal release */\n    setTimeout(release, 800);            /* hard safety net if clock is frozen */\n  }\n  var ds = document.querySelector('deck-stage');\n  if (!ds) return;\n  ds.addEventListener('slidechange', function (e) { reveal(e.detail.slide); });\n  /* in case the first slidechange already fired before this listener attached */\n  setTimeout(function () {\n    var active = ds.querySelector('[data-deck-active]');\n    if (active && active.querySelector('.reveal-pre')) reveal(active);\n  }, 50);\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
